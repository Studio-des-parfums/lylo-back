site_name: Lylo Backend — Documentation
site_description: Documentation technique du backend Lylo pour Le Studio des Parfums
site_url: https://studiodesparfums-paris.fr
repo_url: https://github.com/studiodesparfums/lylo-back
repo_name: lylo-back

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Mode clair
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Accueil: index.md
  - Démarrage rapide:
    - Installation: getting-started/installation.md
    - Variables d'environnement: getting-started/env-vars.md
    - Lancer en local: getting-started/run-local.md
  - Architecture:
    - Vue d'ensemble: architecture/overview.md
    - Services: architecture/services.md
    - Redis & Sessions: architecture/redis.md
    - Agent vocal: architecture/agent.md
  - API Reference:
    - Sessions: api/sessions.md
    - Formules: api/formulas.md
    - Emails: api/mail.md
  - Logique métier:
    - Questionnaire: business/questionnaire.md
    - Génération de formules: business/formula-generation.md
    - Scoring: business/scoring.md
  - Déploiement:
    - Docker Compose: deployment/docker.md
